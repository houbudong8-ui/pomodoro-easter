<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>番茄鐘 · 巴西龜版</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="theme-color" content="#5f9fa6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="番茄鐘">
<style>
  :root{
    --enamel: #b8362f;
    --enamel-dark: #8f281f;
    --cream: #f3ead9;
    --steel: #3a3530;
    --brass: #c9a04c;
    --line: rgba(58,53,48,0.18);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    background:var(--cream);
    font-family: 'Georgia', 'Noto Serif TC', serif;
    color:var(--steel);
    padding: 16px;
  }
  .timer-card{
    position: relative;
    border-radius:20px;
    text-align:center;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06), 0 20px 44px rgba(20,16,12,0.28);
    width: 100%;
    max-width: 380px;
    aspect-ratio: 2 / 3.5;
    overflow: hidden;
    isolation: isolate;
  }
  .bg-image{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit: cover;
    object-position: center top;
    opacity: 0.42;
    filter: saturate(0.9);
    z-index: 0;
  }
  .bg-scrim{
    position:absolute; inset:0;
    background: linear-gradient(180deg,
      rgba(20,16,12,0.15) 0%,
      rgba(20,16,12,0.05) 30%,
      rgba(20,16,12,0.55) 78%,
      rgba(20,16,12,0.78) 100%);
    z-index: 1;
  }
  .content{
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    height: 100%;
    padding: 24px 28px 30px;
  }
  .eyebrow{
    font-family: 'Courier New', monospace;
    font-size:12px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--brass);
    margin-bottom:6px;
  }
  h1{
    font-size:22px;
    font-weight:400;
    margin:0 0 20px;
    letter-spacing:1px;
    color:#fdf9f0;
    text-shadow: 0 1px 6px rgba(0,0,0,0.4);
  }
  .dial{
    position:relative;
    width:184px;height:184px;
    margin:0 auto 20px;
    border-radius:50%;
    background:
      radial-gradient(circle at 50% 50%, rgba(255,255,255,0.14) 0 60%, transparent 62%),
      conic-gradient(var(--enamel) calc(var(--pct,100) * 1%), rgba(255,255,255,0.25) 0);
    display:flex;align-items:center;justify-content:center;
    transition: background 1s linear;
    backdrop-filter: blur(6px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  }
  .dial::after{
    content:"";
    position:absolute;
    width:8px;height:8px;
    background:var(--brass);
    border-radius:50%;
    top:6px;left:50%;
    transform:translateX(-50%);
  }
  .time{
    font-size:38px;
    font-variant-numeric: tabular-nums;
    letter-spacing:1px;
    color:#fdf9f0;
    text-shadow: 0 1px 6px rgba(0,0,0,0.35);
  }
  .mode{
    font-family:'Courier New', monospace;
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:#fdf9f0;
    opacity:0.75;
    margin-bottom:18px;
  }
  .controls{
    display:flex;gap:10px;justify-content:center;
  }
  button{
    font-family:'Courier New', monospace;
    font-size:12px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    padding:10px 18px;
    border-radius:3px;
    border:1px solid rgba(253,249,240,0.6);
    background:rgba(255,255,255,0.08);
    color:#fdf9f0;
    cursor:pointer;
    backdrop-filter: blur(4px);
    transition: all .15s ease;
  }
  button:hover{background:rgba(253,249,240,0.85);color:var(--steel);}
  button.primary{
    background:var(--enamel);
    border-color:var(--enamel-dark);
    color:#fff;
  }
  button.primary:hover{background:var(--enamel-dark); color:#fff;}
  button:focus-visible{outline:2px solid var(--brass); outline-offset:2px;}
  .ring{
    font-size:12px;
    color:#ffd9a8;
    height:16px;
    margin-top:14px;
    opacity:0;
    transition:opacity .3s;
  }
  .ring.show{opacity:1;}
  .install-hint{
    font-size:11px;
    color:#fdf9f0;
    opacity:0.55;
    margin-top:16px;
    line-height:1.5;
  }
</style>
</head>
<body>
<div class="timer-card">

  <img class="bg-image" src="./bg.jpg" alt="嘯天神犬 a.k.a. 陳吉思汗">
  <div class="bg-scrim"></div>

  <div class="content">
    <div class="eyebrow">池畔計時器 · No.25</div>
    <h1>番茄鐘</h1>
    <div class="dial" id="dial" style="--pct:100">
      <div class="time" id="time">25:00</div>
    </div>
    <div class="mode" id="mode">準備開始 · 工作 25 分鐘</div>
    <div class="controls">
      <button class="primary" id="toggle">開始</button>
      <button id="reset">重設</button>
    </div>
    <div class="ring" id="ring">🔔 時間到了,切換一下吧</div>
    <div class="install-hint">加到主畫面後可離線使用</div>
  </div>
</div>

<script>
const WORK = 25*60, BREAK = 5*60;
let remaining = WORK, isWork = true, running = false, tickHandle = null;

const timeEl = document.getElementById('time');
const dialEl = document.getElementById('dial');
const modeEl = document.getElementById('mode');
const toggleBtn = document.getElementById('toggle');
const resetBtn = document.getElementById('reset');
const ringEl = document.getElementById('ring');

function render(){
  const m = String(Math.floor(remaining/60)).padStart(2,'0');
  const s = String(remaining%60).padStart(2,'0');
  timeEl.textContent = `${m}:${s}`;
  const total = isWork ? WORK : BREAK;
  const pct = Math.round((remaining/total)*100);
  dialEl.style.setProperty('--pct', pct);
  modeEl.textContent = isWork ? '工作中 · 25 分鐘' : '休息中 · 5 分鐘';
}

function tick(){
  remaining--;
  if(remaining < 0){
    isWork = !isWork;
    remaining = isWork ? WORK : BREAK;
    ringEl.classList.add('show');
    if (navigator.vibrate) navigator.vibrate([120,60,120]);
    setTimeout(()=>ringEl.classList.remove('show'), 3000);
  }
  render();
}

toggleBtn.addEventListener('click', ()=>{
  running = !running;
  toggleBtn.textContent = running ? '暫停' : '繼續';
  if(running){
    tickHandle = setInterval(tick, 1000);
  } else {
    clearInterval(tickHandle);
  }
});

resetBtn.addEventListener('click', ()=>{
  clearInterval(tickHandle);
  running = false;
  isWork = true;
  remaining = WORK;
  toggleBtn.textContent = '開始';
  render();
});

render();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(()=>{});
  });
}
</script>
</body>
</html>
